name: Publish

on:
  push:
    tags:
      - v[0-9].[0-9]+.[0-9]+

jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo release

      - id: release-version
        uses: intentee/release-action/release-tag-to-version@8125f727e97f72bfef24299d7c6d3217af1453bc
        with:
          release-tag: "${{ github.ref_name }}"

      - uses: intentee/release-action/assert-version@8125f727e97f72bfef24299d7c6d3217af1453bc
        with:
          filename: "./target/release/kalamarnica"
          expected-version: "${{ steps.release-version.outputs.version }}"

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
